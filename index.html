<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>會議摘要器</title>
  <meta name="description" content="貼上會議逐字稿，自動產生重點摘要、決議事項、待辦清單與追蹤郵件草稿。" />
  <style>
    :root {
      --bg: #f4f7f8;
      --surface: #ffffff;
      --surface-2: #edf3f2;
      --ink: #172025;
      --muted: #637078;
      --line: #d8e1e3;
      --accent: #0f766e;
      --accent-2: #b45309;
      --danger: #b42318;
      --shadow: 0 18px 44px rgba(23, 32, 37, .1);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: var(--bg);
      font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
    }

    button, textarea, input, select { font: inherit; }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, .9);
      backdrop-filter: blur(14px);
    }

    .bar {
      width: min(1180px, calc(100% - 32px));
      min-height: 68px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .status {
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--muted);
      background: var(--surface);
      font-size: 14px;
      white-space: nowrap;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 99px;
      background: var(--accent);
    }

    main {
      width: min(1180px, calc(100% - 32px));
      margin: 28px auto;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 18px;
      align-items: start;
    }

    .workspace, .side {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .workspace { overflow: hidden; }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px;
      border-bottom: 1px solid var(--line);
      background: var(--surface-2);
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    select, input {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      padding: 0 10px;
    }

    textarea {
      width: 100%;
      min-height: 420px;
      resize: vertical;
      border: 0;
      padding: 22px;
      color: var(--ink);
      outline: none;
      line-height: 1.7;
      background: #fff;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px;
      border-top: 1px solid var(--line);
      background: #fff;
    }

    button {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 14px;
      color: var(--ink);
      background: #fff;
      cursor: pointer;
      font-weight: 800;
    }

    button.primary {
      border-color: var(--accent);
      color: #fff;
      background: var(--accent);
    }

    button:disabled {
      cursor: wait;
      opacity: .65;
    }

    .side {
      display: grid;
      gap: 0;
      overflow: hidden;
    }

    .panel {
      padding: 16px;
      border-bottom: 1px solid var(--line);
    }

    .panel:last-child { border-bottom: 0; }

    h2 {
      margin: 0 0 10px;
      font-size: 16px;
      letter-spacing: 0;
    }

    .output {
      min-height: 340px;
      padding: 0;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      line-height: 1.65;
      color: var(--ink);
    }

    .hint {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .error {
      color: var(--danger);
      font-weight: 700;
    }

    .meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .metric {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-2);
    }

    .metric strong {
      display: block;
      font-size: 18px;
    }

    .metric span {
      color: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 880px) {
      main { grid-template-columns: 1fr; }
      .bar, main { width: min(100% - 24px, 1180px); }
      .toolbar, .actions { align-items: stretch; flex-direction: column; }
      .controls, .actions button { width: 100%; }
      select, input, button { width: 100%; }
      textarea { min-height: 360px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="bar">
        <h1>會議摘要器</h1>
        <div class="status" id="status"><span class="dot"></span><span>待輸入逐字稿</span></div>
      </div>
    </header>

    <main>
      <section class="workspace" aria-label="會議內容">
        <div class="toolbar">
          <div class="controls">
            <label>
              摘要格式
              <select id="format">
                <option value="executive">主管摘要</option>
                <option value="project">專案追蹤</option>
                <option value="sales">客戶會議</option>
                <option value="class">課程討論</option>
              </select>
            </label>
            <label>
              輸出語言
              <select id="language">
                <option value="繁體中文">繁體中文</option>
                <option value="English">English</option>
                <option value="日本語">日本語</option>
              </select>
            </label>
          </div>
          <button id="sampleBtn" type="button">載入範例</button>
        </div>

        <textarea id="transcript" placeholder="貼上會議逐字稿、錄音轉文字內容，或條列筆記。"></textarea>

        <div class="actions">
          <button class="primary" id="summarizeBtn" type="button">產生摘要</button>
          <button id="copyBtn" type="button">複製結果</button>
          <button id="clearBtn" type="button">清除</button>
        </div>
      </section>

      <aside class="side" aria-label="摘要結果">
        <section class="panel">
          <h2>內容統計</h2>
          <div class="meta">
            <div class="metric"><strong id="charCount">0</strong><span>字元</span></div>
            <div class="metric"><strong id="lineCount">0</strong><span>行數</span></div>
          </div>
        </section>
        <section class="panel">
          <h2>摘要結果</h2>
          <div class="output" id="output"><p class="hint">摘要會包含重點、決議、待辦、風險與追蹤郵件草稿。</p></div>
        </section>
      </aside>
    </main>
  </div>

  <script>
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxC8nhjHBYdI-kJO15snVGLVsbFRcn-9krKWw50ODNC9zBCkLhW-S7pFGaQBzLnl4-6/exec";

    const transcript = document.querySelector("#transcript");
    const format = document.querySelector("#format");
    const language = document.querySelector("#language");
    const summarizeBtn = document.querySelector("#summarizeBtn");
    const copyBtn = document.querySelector("#copyBtn");
    const clearBtn = document.querySelector("#clearBtn");
    const sampleBtn = document.querySelector("#sampleBtn");
    const output = document.querySelector("#output");
    const status = document.querySelector("#status span:last-child");
    const charCount = document.querySelector("#charCount");
    const lineCount = document.querySelector("#lineCount");

    const samples = {
      executive: "王經理：今天先確認節能專案進度。LED 汰換已完成 70%，空壓機洩漏檢測還缺 B 棟。\n李小姐：供應商報價比預算高 8%，但交期可提前兩週。\n陳主任：下週三前整理 ROI 試算，並把風險列入董事會簡報。\n王經理：決議是先核准第一階段，第二階段等 ROI 更新後再排程。",
      project: "PM：本週登入模組完成，報表匯出延後。\n工程：延後原因是權限規則還在確認，預計週五補測。\n設計：新版流程圖今晚提供。\n客戶：希望下週二看到可點擊 demo，並加入錯誤訊息文案。",
      sales: "客戶：目前最痛的是每月盤點花三天，資料又常常對不起來。\n業務：我們可以先導入庫存儀表板，兩週內做 PoC。\n客戶：預算需要控制在 30 萬內，若能串 ERP 會優先。\n業務：週五前提供提案與時程。",
      class: "老師：今天討論 GitHub Pages、GAS proxy 和 Gemini API 的三層架構。\n學生：API key 不能放前端，要存在 GAS 屬性。\n老師：作業是完成一個摘要器，並確認 GitHub repo 沒有 key。\n學生：下次會測試部署網址和錯誤處理。"
    };

    function updateStats() {
      const text = transcript.value.trim();
      charCount.textContent = text.length;
      lineCount.textContent = text ? text.split(/\r?\n/).length : 0;
      status.textContent = text ? "可以產生摘要" : "待輸入逐字稿";
    }

    function setBusy(isBusy) {
      summarizeBtn.disabled = isBusy;
      summarizeBtn.textContent = isBusy ? "產生中..." : "產生摘要";
      status.textContent = isBusy ? "正在呼叫 Gemini" : "可以產生摘要";
    }

    async function summarize() {
      const text = transcript.value.trim();
      if (!text) {
        output.innerHTML = '<p class="error">請先貼上會議內容。</p>';
        status.textContent = "缺少逐字稿";
        return;
      }
      if (GAS_WEB_APP_URL.includes("PASTE_GAS_WEB_APP_URL")) {
        output.innerHTML = '<p class="error">尚未設定 GAS Web App URL。</p>';
        status.textContent = "等待後端網址";
        return;
      }

      setBusy(true);
      output.textContent = "整理會議重點中...";

      try {
        const res = await fetch(GAS_WEB_APP_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify({
            transcript: text,
            format: format.value,
            language: language.value
          })
        });

        const data = await res.json();
        if (!res.ok || !data.ok) {
          throw new Error(formatError(data.error || "摘要服務暫時無法使用"));
        }
        output.textContent = data.summary;
        status.textContent = "摘要完成";
      } catch (error) {
        output.innerHTML = `<p class="error">${escapeHtml(error.message)}</p>`;
        status.textContent = "摘要失敗";
      } finally {
        setBusy(false);
      }
    }

    function escapeHtml(value) {
      return value.replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function formatError(message) {
      if (/quota exceeded|limit:\s*0|rate-limits/i.test(message)) {
        return "Gemini API 額度目前不可用。請到 Google AI Studio 或 Google Cloud 檢查這把 API key 的額度、計費或專案啟用狀態。";
      }
      if (/API key not valid|invalid api key/i.test(message)) {
        return "Gemini API key 無效，請確認 Apps Script 指令碼屬性的 GEMINI_KEY 是否貼上完整且正確的 key。";
      }
      return message;
    }

    transcript.addEventListener("input", updateStats);
    summarizeBtn.addEventListener("click", summarize);
    sampleBtn.addEventListener("click", () => {
      transcript.value = samples[format.value] || samples.executive;
      updateStats();
    });
    clearBtn.addEventListener("click", () => {
      transcript.value = "";
      output.innerHTML = '<p class="hint">摘要會包含重點、決議、待辦、風險與追蹤郵件草稿。</p>';
      updateStats();
    });
    copyBtn.addEventListener("click", async () => {
      const text = output.textContent.trim();
      if (!text) return;
      await navigator.clipboard.writeText(text);
      status.textContent = "結果已複製";
    });

    updateStats();
  </script>
</body>
</html>
